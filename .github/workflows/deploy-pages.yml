name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check backend URL configuration
        # Unset/empty VITE_DATA_MODE defaults to "static" (demo data) in production, which
        # needs no backend URL, so only warn when "api" mode is explicitly requested without one.
        if: ${{ vars.VITE_DATA_MODE == 'api' && vars.VITE_API_BASE_URL == '' }}
        run: echo "::warning::VITE_DATA_MODE=api but VITE_API_BASE_URL is not configured; the published frontend will show a 'Backend URL is not configured' error until the VITE_API_BASE_URL repository variable is set."

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # Leave VITE_DATA_MODE unset (no repository variable) to use the static demo
          # data baked into public/data/. Set it to "api" once a real backend is deployed
          # and VITE_API_BASE_URL above points at it.
          VITE_DATA_MODE: ${{ vars.VITE_DATA_MODE }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
